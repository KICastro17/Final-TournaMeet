<!-- ══ POST FULL VIEW MODAL ══════════════════════════════════════════════ -->
<div id="postModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)closePostModal()">
  <div style="background:#fff;border-radius:12px;width:100%;max-width:900px;max-height:92vh;display:flex;overflow:hidden;position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.4);">

    <!-- Close -->
    <button onclick="closePostModal()" style="position:absolute;top:12px;right:12px;z-index:10;background:rgba(0,0,0,0.5);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>

    <!-- LEFT: Media -->
    <div id="pmMediaWrap" style="flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative;min-height:300px;max-height:92vh;overflow:hidden;">
    </div>

    <!-- RIGHT: Info + Comments -->
    <div style="width:380px;min-width:320px;display:flex;flex-direction:column;border-left:1px solid #e4e6ea;max-height:92vh;">

      <!-- Author -->
      <div style="padding:16px;border-bottom:1px solid #e4e6ea;display:flex;align-items:center;gap:10px;">
        <div id="pmAvatar"></div>
        <div>
          <div id="pmUsername" style="font-weight:700;font-size:14px;color:#1a2540;"></div>
          <div id="pmTime" style="font-size:12px;color:#999;"></div>
        </div>
      </div>

      <!-- Caption -->
      <div id="pmCaption" style="padding:14px 16px;font-size:14px;color:#333;line-height:1.6;border-bottom:1px solid #e4e6ea;max-height:120px;overflow-y:auto;"></div>

      <!-- Like/comment counts -->
      <div style="padding:8px 16px;border-bottom:1px solid #e4e6ea;display:flex;gap:16px;font-size:13px;color:#666;">
        <span>❤️ <span id="pmLikeCnt">0</span> likes</span>
        <span>💬 <span id="pmCommentCnt">0</span> comments</span>
      </div>

      <!-- Action buttons -->
      <div style="padding:6px 16px;border-bottom:1px solid #e4e6ea;display:flex;gap:4px;">
        <button id="pmLikeBtn" onclick="toggleLike(modalPostData.id, this, document.getElementById('pmLikeCnt'))" style="flex:1;padding:8px;border:none;border-radius:6px;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#666;display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.15s;">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="1.8"/></svg>
          Like
        </button>
        <button onclick="document.getElementById('pmCommentInput').focus()" style="flex:1;padding:8px;border:none;border-radius:6px;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#666;display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.15s;">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8"/></svg>
          Comment
        </button>
      </div>

      <!-- Comments list -->
      <div id="pmCommentList" style="flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:2px;"></div>

      <!-- Comment input -->
      <div style="padding:12px 16px;border-top:1px solid #e4e6ea;display:flex;gap:8px;align-items:center;">
        <div id="pmCommentAv" style="flex-shrink:0;"></div>
        <div style="flex:1;background:#f0f2f5;border-radius:20px;display:flex;align-items:center;padding:0 14px;">
          <input id="pmCommentInput" type="text" placeholder="Write a comment…" maxlength="500"
            style="flex:1;border:none;background:none;padding:10px 0;font-size:14px;outline:none;font-family:inherit;"
            onkeydown="if(event.key==='Enter')submitModalComment()"/>
          <button onclick="submitModalComment()" style="background:none;border:none;cursor:pointer;padding:6px;color:#e8630a;">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
/* Post modal nav buttons */
.pm-nav {
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,0.5);border:none;color:#fff;
  width:40px;height:40px;border-radius:50%;font-size:24px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:5;transition:background 0.2s;
}
.pm-nav:hover { background:rgba(0,0,0,0.8); }
.pm-prev { left:10px; }
.pm-next { right:10px; }
.pm-counter {
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.6);color:#fff;font-size:12px;
  padding:3px 10px;border-radius:12px;
}
#pmLikeBtn:hover { background:#fff0ea; color:#e8630a; }
#pmLikeBtn.liked { color:#e8630a; }
#pmLikeBtn.liked svg path { fill:#e8630a; stroke:#e8630a; }

/* No media — right panel takes full width */
#pmMediaWrap:empty, #pmMediaWrap[style*="display: none"] {
  display: none !important;
}
</style>

<script>
// Set current user avatar in modal comment box
document.addEventListener('DOMContentLoaded', () => {
  const avSlot = document.getElementById('pmCommentAv');
  if (avSlot) avSlot.appendChild(makeAvatar(CURRENT_USER.photo, CURRENT_USER.name, 'avatar-xs'));
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePostModal();
});
</script>
